services:
  - type: web
    name: ai-complaint-backend
    env: node
    plan: free
    buildCommand: "cd backend && npm install"
    startCommand: "cd backend && node index.js"
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: ai-complaint-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ai-complaint-backend
          envVarKey: RENDER_EXTERNAL_URL
